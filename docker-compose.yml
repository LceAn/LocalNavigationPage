services:
  local-navigation-page:
    build: .
    image: lcean/local-navigation-page:latest
    container_name: local-navigation-page

    ports:
      - "8080:80"  # 主机端口:容器端口，可自定义

    volumes:
      # 持久化链接配置；首次启动若目录中没有 links.json，容器会自动生成默认文件
      - ./HTML/data:/usr/share/nginx/html/data

    restart: unless-stopped
